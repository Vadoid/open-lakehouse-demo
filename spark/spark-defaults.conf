# Spark Thrift Server config: Iceberg V3 via Lakekeeper REST catalog over MinIO.
# Iceberg 1.11.x is the V3-stable line; iceberg-aws-bundle gives S3FileIO for MinIO.
# Jars are staged into /opt/spark/jars by the spark-thrift container command in
# main.tf — spark.jars.packages does NOT work for Thrift Server: the resolved
# jars aren't on the system classloader, so Catalogs$.load throws
# ClassNotFoundException when a session opens.

spark.sql.extensions                      org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# REST catalog "demo" -> Lakekeeper
spark.sql.catalog.demo                    org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.demo.type               rest
spark.sql.catalog.demo.uri                http://lakekeeper:8181/catalog
spark.sql.catalog.demo.warehouse          demo
spark.sql.catalog.demo.token              dummy

# Object store. ResolvingFileIO dispatches by URI scheme: s3:// -> S3FileIO
# (MinIO, static creds below), gs:// -> GCSFileIO (GCS). A hardcoded S3FileIO
# forces the AWS SDK onto gs:// paths and dies with "Unable to load region" the
# moment Spark writes data files to a GCS warehouse.
spark.sql.catalog.demo.io-impl            org.apache.iceberg.io.ResolvingFileIO
spark.sql.catalog.demo.s3.endpoint        http://lake-minio:9000
spark.sql.catalog.demo.s3.path-style-access true
spark.sql.catalog.demo.s3.access-key-id   minio-admin
spark.sql.catalog.demo.s3.secret-access-key minio-admin-password
# GCS creds aren't static (entered at runtime in the webapp, never reach this
# container). Lakekeeper vends a per-table downscoped OAuth token in the REST
# load-table response; access-delegation tells the Iceberg REST client to ask
# for it. The header form is the reliable cross-version trigger.
spark.sql.catalog.demo.rest.access-delegation true
spark.sql.catalog.demo.header.X-Iceberg-Access-Delegation vended-credentials

spark.sql.defaultCatalog                  demo
spark.sql.catalogImplementation           in-memory

# Driver memory. 6g exceeds headroom on a 7.65 GiB Docker Desktop host and
# Docker OOM-kills the JVM mid-rewrite_data_files (silent SIGKILL, no log).
# 4g + 1g maxResultSize leaves room for the other 4 containers + page cache.
spark.driver.memory                       4g
spark.driver.maxResultSize                1g

# Cap shuffle parallelism so 200 partitions x ~100 MB each don't blow the heap
# during sort/zorder rewrites of the 5M-row demo table.
spark.sql.shuffle.partitions              64

# Self-healing on OOM: tell the JVM to die hard on OutOfMemoryError instead of
# zombieing in a half-dead state. The container's PID-1 supervisor then exits,
# Docker's restart policy revives the container.
spark.driver.extraJavaOptions             -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp
spark.executor.extraJavaOptions           -XX:+ExitOnOutOfMemoryError
